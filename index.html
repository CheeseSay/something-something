<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
}

/* MAIN CARD */
.card {
    text-align: center;
    background: #1f1f1f;
    padding: 20px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 0 25px rgba(255,0,120,0.3);
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ff3d7f;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #ff1f66;
}

.result {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

canvas {
    margin-top: 12px;
    width: 100%;
    height: 80px;
    background: black;
    border-radius: 10px;
}

/* FINAL SCREEN */
.finalScreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff3d7f, #7b2ff7);
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

.finalBox {
    padding: 30px;
}

.finalBox h1 {
    font-size: 32px;
}

.small {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.9;
}
</style>
</head>

<body>

<!-- MAIN CARD -->
<div class="card" id="mainCard">

    <h3>💘 Birthday Analyzer</h3>

    <input id="name1" placeholder="Your name">
    <input id="name2" placeholder="His/Her name">

    <button onclick="calculateLove()">Analyze 💖</button>

    <div class="result" id="result">Result: --%</div>

    <button onclick="toggleMusic()">🎵 Play Music</button>

    <canvas id="visualizer"></canvas>

    <button onclick="showFinal()">Finish 🎂</button>

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

</div>

<!-- FINAL SCREEN -->
<div class="finalScreen" id="finalScreen">
    <div class="finalBox">
        <h1>🎉 Happy Birthday 🎂</h1>
        <p>Hope your day is as special as you are 💖</p>
        <div class="small">Made with care ✨</div>
    </div>
</div>

<script>
let music = document.getElementById("music");
let playing = false;

/* LOVE CALC */
function calculateLove() {
    let a = document.getElementById("name1").value;
    let b = document.getElementById("name2").value;

    if (!a || !b) return;

    let seed = (a + b).split("").reduce((x,c)=>x+c.charCodeAt(0),0);
    let percent = (seed % 51) + 50;

    document.getElementById("result").innerText =
        `Result: ${percent}% 💖`;
}

/* MUSIC */
function toggleMusic() {
    if (!playing) {
        music.play();
        setupVisualizer();
        playing = true;
    } else {
        music.pause();
        playing = false;
    }
}

/* VISUALIZER */
function setupVisualizer() {
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let source = audioCtx.createMediaElementSource(music);
    let analyser = audioCtx.createAnalyser();

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 64;

    let bufferLength = analyser.frequencyBinCount;
    let dataArray = new Uint8Array(bufferLength);

    let canvas = document.getElementById("visualizer");
    let ctx = canvas.getContext("2d");

    function draw() {
        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let barWidth = (canvas.width / bufferLength) * 2;
        let x = 0;

        for (let i=0;i<bufferLength;i++) {
            let barHeight = dataArray[i] / 2;

            ctx.fillStyle = "#ff3d7f";
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 2;
        }
    }

    draw();
}

/* FINAL SCREEN TRIGGER */
function showFinal() {
    document.getElementById("mainCard").style.display = "none";
    document.getElementById("finalScreen").style.display = "flex";

    music.play();
}

</script>

<a href="mainpage.html">Main Page</a>
<a href="visualizer.html">Visualizer</a>

<a href="mainpage.html">
  <button>Go Main Page</button>
</a>

</body>
</html>
